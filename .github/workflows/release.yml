name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux (amd64)
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            artifact: lanshare-linux-amd64

          - name: Linux (arm64)
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            artifact: lanshare-linux-arm64

          - name: Windows (amd64)
            os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
            artifact: lanshare-windows-amd64

          - name: macOS (Intel)
            os: ubuntu-latest
            goos: darwin
            goarch: amd64
            ext: ""
            artifact: lanshare-darwin-amd64

          - name: macOS (Apple Silicon)
            os: ubuntu-latest
            goos: darwin
            goarch: arm64
            ext: ""
            artifact: lanshare-darwin-arm64

          - name: Android (arm64)
            os: ubuntu-latest
            goos: android
            goarch: arm64
            ext: ""
            artifact: lanshare-android-arm64

          - name: Android (armv7a)
            os: ubuntu-latest
            goos: android
            goarch: arm
            goarm: "7"
            ext: ""
            artifact: lanshare-android-armv7a

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
          go build -trimpath -ldflags="-s -w" -o ${{ matrix.artifact }}${{ matrix.ext }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  build-deb:
    name: Build .deb Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build .deb
        run: |
          ./build/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lanshare-deb
          path: dist/packaging/*.deb

  build-macos-app:
    name: Build macOS .app Bundle
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build universal binary + .app
        run: |
          # Build both arches
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o lanshare-amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o lanshare-arm64 .
          # Create universal binary
          lipo -create -output lanshare lanshare-amd64 lanshare-arm64
          # Create .app bundle
          mkdir -p "LanShare.app/Contents/MacOS"
          cp lanshare "LanShare.app/Contents/MacOS/"
          cp packaging/macos/Info.plist "LanShare.app/Contents/Info.plist" 2>/dev/null || cat > "LanShare.app/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>lanshare</string>
    <key>CFBundleIdentifier</key>
    <string>com.lanshare.app</string>
    <key>CFBundleName</key>
    <string>LanShare</string>
    <key>CFBundleVersion</key>
    <string>1.0.0</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>LSMinimumSystemVersion</key>
    <string>10.12</string>
    <key>NSHighResolutionCapable</key>
    <true/>
</dict>
</plist>
PLIST
          zip -r LanShare-macOS.zip LanShare.app
      - uses: actions/upload-artifact@v4
        with:
          name: lanshare-macos
          path: LanShare-macOS.zip

  release:
    name: Create Release
    needs: [build, build-deb, build-macos-app]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          body: |
            # LanShare v${{ github.ref_name }}

            Cross-Platform Local Network File Sharing

            ## Downloads

            ### Linux
            - `lanshare-linux-amd64` - x86_64
            - `lanshare-linux-arm64` - ARM64 (Raspberry Pi, etc.)
            - `lanshare.deb` - Debian/Ubuntu package

            ### Windows
            - `lanshare-windows-amd64.exe` - Portable executable

            ### macOS
            - `LanShare-macOS.zip` - .app bundle (Universal: Intel + Apple Silicon)

            ### Android
            - `lanshare-android-arm64` - For Termux (modern devices)
            - `lanshare-android-armv7a` - For Termux (older devices)

            ### iOS
            - Use the Web UI: `http://YOUR_IP:8080` (iPhone 4 / iOS 7 compatible)
