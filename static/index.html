<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LanShare</title>
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root {
  --bg-blur: .85;
  --card-blur: .72;
  --radius: 14px;
  --accent: #a78bfa;
  --accent2: #7c3aed;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --card-bg: rgba(18,18,40,var(--card-blur));
  --card-border: rgba(255,255,255,0.06);
  --input-bg: rgba(0,0,0,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system,'Segoe UI',sans-serif;
  background:#0a0a1a;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body.has-bg{background:transparent}

#bgLayer{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  display:none; transition:opacity .6s;
}
#bgOverlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  background:radial-gradient(ellipse at 30% 20%, rgba(10,10,30,0.55), rgba(0,0,0,0.88));
  pointer-events:none;
}

#app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:14px 16px 32px}

/* ---- Header ---- */
.header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;margin-bottom:10px;border-radius:var(--radius);
  background:var(--card-bg); backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px); border:1px solid var(--card-border);
}
.header .logo{font-size:20px;font-weight:700;color:var(--accent)}
.header .ip-bar{font-size:12px;color:var(--text2);text-align:right}
.header .ip-bar b{color:var(--text);font-size:14px;display:block}

/* ---- Stats Row ---- */
.stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stat{flex:1;min-width:80px;padding:12px 10px;text-align:center;
  border-radius:var(--radius); border:1px solid var(--card-border);
  background:var(--card-bg); backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.stat .v{font-size:20px;font-weight:700;color:var(--accent)}
.stat .l{font-size:11px;color:var(--text2);margin-top:2px}

/* ---- Tabs ---- */
.tabs{display:flex;gap:4px;margin-bottom:10px}
.tabs button{flex:1;padding:10px 8px;font-size:13px;font-weight:600;border:none;cursor:pointer;
  background:rgba(255,255,255,0.06);color:var(--text2);border-radius:10px;
  transition:all .2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.tabs button.on{background:var(--accent2);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,0.4)}

/* ---- Panels ---- */
.panel{display:none;border-radius:var(--radius);border:1px solid var(--card-border);
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px);padding:14px;min-height:200px}
.panel.on{display:block}

/* ---- File List ---- */
.empty{padding:40px 10px;text-align:center;color:var(--text2);opacity:.6}
.empty .icon{font-size:48px;margin-bottom:10px}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:4px;
  border-radius:10px;background:rgba(255,255,255,0.04);transition:background .15s}
.file-row:hover{background:rgba(255,255,255,0.08)}
.file-row .ficon{font-size:22px;flex-shrink:0}
.file-row .fname{flex:1;font-size:13px;word-break:break-all;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-row .fsize{font-size:11px;color:var(--text2);white-space:nowrap}
.file-row .btns{display:flex;gap:4px}
.file-row .btns button{font-size:11px;padding:6px 10px;border:none;border-radius:8px;cursor:pointer;
  font-weight:600;transition:all .15s}
.file-row .dl-btn{background:#1e40af;color:#fff}
.file-row .dl-btn:hover{background:#2563eb}
.file-row .del-btn{background:rgba(239,68,68,0.2);color:#f87171}
.file-row .del-btn:hover{background:rgba(239,68,68,0.4)}

/* ---- Upload Zone ---- */
.upload-zone{position:relative;border:2px dashed rgba(255,255,255,0.15);border-radius:var(--radius);
  padding:30px 16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(124,58,237,0.08)}
.upload-zone .icon{font-size:40px;margin-bottom:8px}
.upload-zone .txt{font-size:14px;font-weight:600;color:var(--text2)}
.upload-zone .sub{font-size:11px;color:var(--text2);margin-top:4px;opacity:.6}
.upload-zone input{display:none}
#uploadStatus{margin-top:10px;font-size:12px;color:var(--accent);text-align:center}

/* ---- Settings ---- */
.settings .field{margin-bottom:14px}
.settings .field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.settings .field input,.settings .field select{
  width:100%;padding:10px 12px;font-size:13px;border-radius:10px;
  border:1px solid var(--card-border);background:var(--input-bg);
  color:var(--text);outline:none;font-family:monospace;
  transition:border .2s}
.settings .field input:focus{border-color:var(--accent)}
.settings .btn{width:100%;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:12px;
  cursor:pointer;color:#fff;margin-top:6px;transition:all .15s}
.settings .btn.apply{background:var(--accent2);margin-bottom:8px}
.settings .btn.bg-btn{background:rgba(255,255,255,0.1)}
.settings .btn:hover{opacity:.85}
.settings .hint{font-size:11px;color:var(--text2);text-align:center;margin-top:10px;opacity:.7}
.settings .format-hint{font-size:11px;color:var(--text2);margin-top:6px;opacity:.6}

/* ---- Toast ---- */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:99;
  padding:10px 24px;border-radius:20px;background:rgba(30,30,60,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;font-size:13px;font-weight:600;border:1px solid var(--card-border);
  opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}

/* ---- Loading ---- */
.loading{text-align:center;padding:30px;color:var(--text2)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<div id="app">
  <div class="header">
    <div class="logo">📁 LanShare</div>
    <div class="ip-bar">
      <b id="ipDisplay">--.---.---.---</b>
      <span id="portDisplay">:8080</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="statUc">-</div><div class="l">📤 上傳文件</div></div>
    <div class="stat"><div class="v" id="statDc">-</div><div class="l">📥 下載文件</div></div>
    <div class="stat"><div class="v" id="statTotal">-</div><div class="l">💾 總大小</div></div>
    <div class="stat"><div class="v" id="statUp">-</div><div class="l">⏱ 運行時間</div></div>
  </div>

  <div class="tabs">
    <button id="tabDown" onclick="switchTab('down')">📥 下載區</button>
    <button id="tabUp" onclick="switchTab('up')">📤 上傳區</button>
    <button id="tabSet" onclick="switchTab('set')">⚙️ 設定</button>
  </div>

  <!-- Download Panel -->
  <div class="panel on" id="pnlDown">
    <div class="loading" id="loadDown"><div class="spinner"></div></div>
    <div class="empty" id="emptyDown" style="display:none"><div class="icon">📭</div>下載區尚無檔案</div>
    <div id="listDown"></div>
  </div>

  <!-- Upload Panel -->
  <div class="panel" id="pnlUp">
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">☁️</div>
      <div class="txt">點擊或拖曳檔案上傳</div>
      <div class="sub">支援所有格式，最大 4GB</div>
      <input type="file" id="fileInput" multiple onchange="doUpload()">
    </div>
    <div id="uploadStatus"></div>
    <div style="margin-top:14px">
      <div class="loading" id="loadUp"><div class="spinner"></div></div>
      <div class="empty" id="emptyUp" style="display:none"><div class="icon">📭</div>上傳區尚無檔案</div>
      <div id="listUp"></div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="panel settings" id="pnlSet">
    <div class="field">
      <label>📤 上傳儲存路徑</label>
      <input id="setUploadDir" placeholder="/path/to/uploads">
      <div class="format-hint">他人上傳的檔案會存到這裡</div>
    </div>
    <div class="field">
      <label>📥 下載來源路徑</label>
      <input id="setDownloadDir" placeholder="/path/to/downloads">
      <div class="format-hint">可下載的檔案來自這個目錄</div>
    </div>
    <button class="btn apply" onclick="saveSettings()">✅ 套用設定</button>

    <div style="border-top:1px solid var(--card-border);margin:18px 0 14px"></div>
    <label style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:block">🖼️ 自訂背景圖片</label>
    <button class="btn bg-btn" onclick="document.getElementById('bgInput').click()">📷 選擇背景圖片</button>
    <input type="file" id="bgInput" accept="image/*" onchange="uploadBg()" style="display:none">
    <button class="btn bg-btn" onclick="clearBg()" style="margin-top:4px">🗑️ 清除背景</button>
    <div class="format-hint">支援 JPG / PNG / GIF / WebP / BMP</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = '';
var currentTab = 'down';
var bgUrl = '';

function $(id){return document.getElementById(id)}

// ===== INIT =====
async function init(){
  try{var r=await fetch('/api/info');var d=await r.json();
    API=''; $('ipDisplay').textContent=d.ip; $('portDisplay').textContent=':'+d.port;
    $('statUc').textContent=d.upload_count; $('statDc').textContent=d.download_count;
    $('statTotal').textContent=d.total_size_str; $('statUp').textContent=d.uptime;
    $('setUploadDir').value=d.upload_dir; $('setDownloadDir').value=d.download_dir;
  }catch(e){}
  loadBg();
  switchTab('down');
  refreshDown();
  refreshUp();
  setInterval(refreshStats,5000);
}

// ===== BACKGROUND =====
function loadBg(){
  var saved=localStorage.getItem('lanshare_bg');
  if(saved){ setBg(saved); }
}

function setBg(url){
  bgUrl=url; localStorage.setItem('lanshare_bg',url);
  var el=$('bgLayer');
  el.style.display='block'; el.style.backgroundImage='url('+url+')';
  document.body.classList.add('has-bg');
  extractColor(url);
}

function clearBg(){
  bgUrl=''; localStorage.removeItem('lanshare_bg');
  $('bgLayer').style.display='none';
  document.body.classList.remove('has-bg');
  resetAccent();
  toast('背景已清除');
}

async function uploadBg(){
  var f=$('bgInput').files[0]; if(!f)return;
  var fd=new FormData(); fd.append('bg',f);
  try{var r=await fetch('/api/upload-bg',{method:'POST',body:fd});
    if(!r.ok){toast('❌ 不支援的格式');return}
    var d=await r.json(); setBg(d.url); toast('✅ 背景已套用');
  }catch(e){toast('❌ 上傳失敗')}
}

function extractColor(url){
  var img=new Image(); img.crossOrigin='anonymous';
  img.onload=function(){
    var c=document.createElement('canvas');c.width=50;c.height=50;
    var ctx=c.getContext('2d');ctx.drawImage(img,0,0,50,50);
    var d=ctx.getImageData(0,0,50,50).data;
    var r=0,g=0,b=0,n=0;
    for(var i=0;i<d.length;i+=16){ r+=d[i];g+=d[i+1];b+=d[i+2];n++; }
    r=Math.floor(r/n);g=Math.floor(g/n);b=Math.floor(b/n);

    // Decide light or dark
    var lum=(0.299*r+0.587*g+0.114*b)/255;
    var text=lum<0.5?'#e2e8f0':'#1e293b';
    var text2=lum<0.5?'#94a3b8':'#64748b';
    var accent,accent2;
    if(lum<0.5){
      accent='hsl('+rgb2hsl(r,g,b).h+',60%,70%)';
      accent2='hsl('+rgb2hsl(r,g,b).h+',50%,50%)';
    }else{
      accent='hsl('+rgb2hsl(r,g,b).h+',60%,40%)';
      accent2='hsl('+rgb2hsl(r,g,b).h+',50%,35%)';
    }
    var cardBg=lum<0.5?'rgba(18,18,40,0.72)':'rgba(255,255,255,0.4)';
    var cardBorder=lum<0.5?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.08)';
    var inputBg=lum<0.5?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.3)';

    document.documentElement.style.setProperty('--accent',accent);
    document.documentElement.style.setProperty('--accent2',accent2);
    document.documentElement.style.setProperty('--text',text);
    document.documentElement.style.setProperty('--text2',text2);
    document.documentElement.style.setProperty('--card-bg',cardBg);
    document.documentElement.style.setProperty('--card-border',cardBorder);
    document.documentElement.style.setProperty('--input-bg',inputBg);
    if(lum<0.5){$('bgOverlay').style.background='radial-gradient(ellipse at 30% 20%, rgba(10,10,30,0.55), rgba(0,0,0,0.85))'}
    else{$('bgOverlay').style.background='radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.15), rgba(255,255,255,0.6))'}
  };
  img.src=url;
}

function rgb2hsl(r,g,b){
  r/=255;g/=255;b/=255;
  var M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m;
  var h=0,s=0,l=(M+m)/2;
  if(d!==0){
    s=l>0.5?d/(2-M-m):d/(M+m);
    switch(M){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function resetAccent(){
  document.documentElement.style.setProperty('--accent','#a78bfa');
  document.documentElement.style.setProperty('--accent2','#7c3aed');
  document.documentElement.style.setProperty('--text','#e2e8f0');
  document.documentElement.style.setProperty('--text2','#94a3b8');
  document.documentElement.style.setProperty('--card-bg','rgba(18,18,40,0.72)');
  document.documentElement.style.setProperty('--card-border','rgba(255,255,255,0.06)');
  document.documentElement.style.setProperty('--input-bg','rgba(0,0,0,0.25)');
  $('bgOverlay').style.background='radial-gradient(ellipse at 30% 20%, rgba(10,10,30,0.55), rgba(0,0,0,0.88))';
}

// ===== TABS =====
function switchTab(t){
  currentTab=t;
  ['tabDown','tabUp','tabSet'].forEach(function(id){$(id).classList.remove('on')});
  ['pnlDown','pnlUp','pnlSet'].forEach(function(id){$(id).classList.remove('on')});
  if(t==='down'){$('tabDown').classList.add('on');$('pnlDown').classList.add('on');refreshDown()}
  else if(t==='up'){$('tabUp').classList.add('on');$('pnlUp').classList.add('on');refreshUp()}
  else{$('tabSet').classList.add('on');$('pnlSet').classList.add('on')}
}

// ===== FILES =====
async function refreshDown(){ await loadFiles('down'); }
async function refreshUp(){ await loadFiles('up'); }

async function loadFiles(type){
  var loadEl=$('load'+capitalize(type));
  var emptyEl=$('empty'+capitalize(type));
  var listEl=$('list'+capitalize(type));
  loadEl.style.display='block';emptyEl.style.display='none';listEl.innerHTML='';
  try{
    var r=await fetch('/api/files?type='+type);var files=await r.json();
    loadEl.style.display='none';
    if(!files.length){emptyEl.style.display='block';return}
    var html='';
    files.forEach(function(f){
      var icon=getIcon(f.name);
      html+='<div class="file-row">'+
        '<span class="ficon">'+icon+'</span>'+
        '<span class="fname" title="'+esc(f.name)+'">'+f.name+'</span>'+
        '<span class="fsize">'+f.size_str+'</span>'+
        '<div class="btns">'+
          '<button class="dl-btn" onclick="dl(\''+enc(f.name)+'\')">⬇</button>'+
          '<button class="del-btn" onclick="del(\''+enc(f.name)+'\',\''+type+'\')">✕</button>'+
        '</div></div>';
    });
    listEl.innerHTML=html;
  }catch(e){loadEl.style.display='none';emptyEl.style.display='block'}
}

function getIcon(n){
  var e=n.toLowerCase();
  if(/\.(jpg|jpeg|png|gif|webp|bmp|svg|ico)$/.test(e))return '🖼️';
  if(/\.(mp4|webm|mkv|avi|mov)$/.test(e))return '🎬';
  if(/\.(mp3|wav|flac|ogg|aac|m4a)$/.test(e))return '🎵';
  if(/\.(zip|rar|7z|tar|gz)$/.test(e))return '📦';
  if(/\.(pdf)$/.test(e))return '📄';
  if(/\.(apk)$/.test(e))return '📱';
  if(/\.(exe|dmg|appimage)$/.test(e))return '⚙️';
  if(/\.(iso)$/.test(e))return '💿';
  if(/\.(txt|md|log|json|xml|yaml|yml)$/.test(e))return '📝';
  if(/\.(html|htm|css|js)$/.test(e))return '🌐';
  return '📁';
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function enc(s){return encodeURIComponent(s)}

function dl(name){
  window.open('/f/'+encodeURIComponent(name));
}

async function del(name,type){
  if(!confirm('確定刪除 '+name+' ？'))return;
  try{
    await fetch('/api/delete',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:decodeURIComponent(name),type:type})});
    if(type==='down')refreshDown();else refreshUp();
    refreshStats();
    toast('🗑️ 已刪除 '+decodeURIComponent(name));
  }catch(e){toast('❌ 刪除失敗')}
}

// ===== UPLOAD =====
async function doUpload(){
  var files=$('fileInput').files; if(!files.length)return;
  var fd=new FormData();
  for(var i=0;i<files.length;i++)fd.append('file',files[i]);
  $('uploadStatus').textContent='上傳中...';
  try{
    var r=await fetch('/api/upload',{method:'POST',body:fd});
    var d=await r.json();
    $('uploadStatus').textContent='✅ 上傳完成：'+d.uploaded.join(', ');
    $('fileInput').value='';
    refreshUp(); refreshStats();
  }catch(e){$('uploadStatus').textContent='❌ 上傳失敗'}
}

// ===== SETTINGS =====
async function saveSettings(){
  var ud=$('setUploadDir').value.trim();
  var dd=$('setDownloadDir').value.trim();
  if(!ud&&!dd){toast('請輸入路徑');return}
  try{
    await fetch('/api/settings',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({upload_dir:ud,download_dir:dd})});
    toast('✅ 設定已套用');
    refreshStats();
  }catch(e){toast('❌ 設定失敗')}
}

async function refreshStats(){
  try{var r=await fetch('/api/info');var d=await r.json();
    $('statUc').textContent=d.upload_count;$('statDc').textContent=d.download_count;
    $('statTotal').textContent=d.total_size_str;$('statUp').textContent=d.uptime;
    $('setUploadDir').value=d.upload_dir;$('setDownloadDir').value=d.download_dir;
  }catch(e){}
}

// ===== DRAG & DROP =====
(function(){
  var dz=$('dropZone');
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});
  dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');
    var dt=e.dataTransfer;if(!dt.files.length)return;
    var fd=new FormData();
    for(var i=0;i<dt.files.length;i++)fd.append('file',dt.files[i]);
    $('uploadStatus').textContent='上傳中...';
    fetch('/api/upload',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
      $('uploadStatus').textContent='✅ '+d.uploaded.join(', ');refreshUp();refreshStats();
    });
  });
})();

// ===== TOAST =====
function toast(msg){
  var t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2200);
}

// ===== START =====
init();
</script>
</body>
</html>
