<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow effect -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="40"/>

  <!-- Network nodes background -->
  <circle cx="128" cy="160" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="384" cy="120" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="400" cy="320" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="160" cy="380" r="4" fill="#60a5fa" opacity="0.5"/>

  <!-- Network connection lines -->
  <line x1="128" y1="160" x2="256" y2="200" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <line x1="384" y1="120" x2="256" y2="200" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="320" x2="256" y2="340" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <line x1="160" y1="380" x2="256" y2="340" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <line x1="128" y1="160" x2="160" y2="380" stroke="#60a5fa" stroke-width="1" opacity="0.15"/>
  <line x1="384" y1="120" x2="400" y2="320" stroke="#60a5fa" stroke-width="1" opacity="0.15"/>

  <!-- Device nodes -->
  <circle cx="128" cy="160" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="384" cy="120" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="400" cy="320" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="160" cy="380" r="6" fill="#60a5fa" opacity="0.8"/>

  <!-- Central server icon (folder shape) -->
  <rect x="190" y="200" width="132" height="100" rx="16" fill="url(#accent)" opacity="0.95"/>
  <path d="M190 230 L190 216 C190 207.2 197.2 200 206 200 L240 200 L256 220 L322 220 C330.8 220 322 230 322 230 L190 230Z" fill="#ffffff" opacity="0.2"/>
  <rect x="206" y="240" width="100" height="8" rx="4" fill="#ffffff" opacity="0.6"/>
  <rect x="206" y="256" width="80" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="206" y="268" width="60" height="6" rx="3" fill="#ffffff" opacity="0.3"/>

  <!-- Upload arrow -->
  <path d="M256 170 L256 200 M244 182 L256 170 L268 182" stroke="#7c3aed" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Download indicator -->
  <path d="M256 380 L256 350 M244 368 L256 380 L268 368" stroke="#a78bfa" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Bottom text area (subtle) -->
  <rect x="148" y="430" width="216" height="36" rx="18" fill="#1a1a3e" stroke="#3d2d7e" stroke-width="1"/>
  <text x="256" y="454" font-family="sans-serif" font-weight="700" font-size="16" fill="#a78bfa" text-anchor="middle" letter-spacing="3">LANSHARE</text>
</svg>
